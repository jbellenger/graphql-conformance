services:
  app:
    build:
      context: .
    image: graphql-conformance:dev
    working_dir: /work
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - .:/work:cached
      - m2:/home/conformance/.m2
      - gradle:/home/conformance/.gradle
      - cargo-registry:/home/conformance/.cargo/registry
      - cargo-git:/home/conformance/.cargo/git
      - pip-cache:/home/conformance/.cache/pip
      - go-mod:/home/conformance/go/pkg/mod
      - gem-cache:/home/conformance/.gem
      - mix-deps:/home/conformance/.mix
      - nuget-cache:/home/conformance/.nuget
    environment:
      BUILD_CONCURRENCY: ${BUILD_CONCURRENCY:-}
      CORPUS_DIR: ${CORPUS_DIR:-}
      RESULTS_DIR: ${RESULTS_DIR:-}
      SITE_DATA_DIR: ${SITE_DATA_DIR:-}
      CONFIG_PATH: ${CONFIG_PATH:-}
    ports:
      - "8000:8000"
    tty: true
    stdin_open: true

volumes:
  m2:
  gradle:
  cargo-registry:
  cargo-git:
  pip-cache:
  go-mod:
  gem-cache:
  mix-deps:
  nuget-cache:
