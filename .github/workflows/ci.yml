name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'results/data/**'
  pull_request:
    branches:
      - master
  merge_group:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CONFORMER_CONCURRENCY: 4
      CONFORMER_STOP_TIMEOUT_SECS: '1'
      CONFORMER_USE_EXISTING_IMAGE: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Expose GitHub Actions runtime
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Build dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: graphql-conformance:dev
          cache-from: type=gha,scope=conformance
          cache-to: type=gha,mode=max,scope=conformance

      - name: Pre-build impl images
        run: bash scripts/ci-prebuild-impls.sh

      - name: Run smoke suite
        run: make ci-smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: ignore
          name: smoke
          path: |
            .tmp/ci-results
            .tmp/site-data
