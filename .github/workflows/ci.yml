name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'results/data/**'
      - 'site/data/**'
      - 'README.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BUILD_CONCURRENCY: 2
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: graphql-conformance:dev
          cache-from: type=gha,scope=conformance
          cache-to: type=gha,mode=max,scope=conformance

      - name: Run smoke suite
        run: make ci-smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: smoke
          path: |
            .tmp/ci-results
            .tmp/site-data
