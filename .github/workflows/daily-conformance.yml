name: Daily Conformance

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC = 05:00 PDT / 04:00 PST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-conformance
  cancel-in-progress: false

jobs:
  run:
    name: Full conformance run
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BUILD_CONCURRENCY: 2
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CONFORMANCE_APP_ID }}
          private-key: ${{ secrets.CONFORMANCE_APP_SECRET_KEY }}

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: graphql-conformance:dev
          cache-from: type=gha,scope=conformance
          cache-to: type=gha,mode=max,scope=conformance

      - name: Install conformer + corpus-gen deps
        run: make build

      - name: Run full conformance suite (forced)
        run: make run-conformer CONFORMER_ARGS=--force

      - name: Commit and push results
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          BOT_USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name  "${APP_SLUG}[bot]"
          git config user.email "${BOT_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add results/data
          if git diff --cached --quiet; then
            echo "No result changes to commit."
            exit 0
          fi
          git commit -m "chore(daily): conformance run $(date -u +%FT%TZ)"
          git push
